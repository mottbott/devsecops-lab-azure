version: 2

updates:
  # Python dependencies declared in pyproject.toml (root).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: deps(python)
    # Bundle all minor + patch updates into ONE PR per week to cut noise.
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch
    # Skip major bumps — those need manual review (likely breaking changes).
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions referenced in any .github/workflows/*.yml.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps(actions)
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Container base image referenced in Dockerfile.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: deps(docker)
    # python base image is pinned to 3.12 by pyproject's requires-python.
    # Major bumps of the base would mismatch the wheels — keep them manual.
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]
